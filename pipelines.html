<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pipelines</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pipelines">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,200&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #242424;
    --text: #e8e4dc;
    --muted: #5a5a5a;
    --accent: #c8b98a;
    --accent-dim: #c8b98a22;
    --seed-bg: #1a1a1a;
    --seed-border: #2a2a2a;
    --danger: #8a4a4a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 1.3rem;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  .logo span {
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    margin-left: 8px;
    vertical-align: middle;
  }

  .tab-bar {
    display: flex;
    gap: 4px;
  }

  .tab {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .tab.active {
    border-color: var(--border);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* SEED COUNT */
  .meta-bar {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .seed-count {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .seed-count strong {
    color: var(--accent);
    font-weight: 400;
  }

  .clear-all {
    background: none;
    border: none;
    color: var(--danger);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s;
    padding: 4px 0;
  }

  .clear-all.visible { opacity: 1; }

  /* QUEUE */
  .queue {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .queue:empty::after {
    content: 'thoughts flow through here';
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-top: 40px;
    display: block;
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-weight: 200;
  }

  .seed {
    background: var(--seed-bg);
    border: 1px solid var(--seed-border);
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: seedIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    cursor: grab;
    transition: border-color 0.2s, background 0.2s;
  }

  .seed:active { cursor: grabbing; }
  .seed:hover { border-color: #333; background: #1d1d1d; }

  .seed.removing {
    animation: seedOut 0.2s ease forwards;
  }

  @keyframes seedIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes seedOut {
    from { opacity: 1; transform: translateX(0); max-height: 80px; }
    to   { opacity: 0; transform: translateX(12px); max-height: 0; padding: 0; margin: 0; }
  }

  .seed-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 6px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .seed-text {
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
    word-break: break-word;
  }

  .seed-time {
    font-size: 0.58rem;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .seed-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .seed:hover .seed-delete { opacity: 1; }
  .seed-delete:hover { color: var(--danger); }

  /* INPUT */
  .input-zone {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 14px 20px 20px;
    background: var(--bg);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  #seed-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    padding: 10px 14px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    overflow-y: auto;
    scrollbar-width: none;
  }

  #seed-input:focus {
    border-color: var(--accent);
  }

  #seed-input::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .submit-btn {
    background: var(--accent);
    border: none;
    border-radius: 4px;
    width: 42px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:active { transform: scale(0.94); }

  .submit-btn svg {
    width: 16px;
    height: 16px;
    fill: var(--bg);
  }

  .hint {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 8px;
    text-align: center;
  }

  /* BOARD TAB PLACEHOLDER */
  .board-placeholder {
    flex: 1;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 40px 20px;
  }

  .board-placeholder.visible { display: flex; }

  .board-placeholder p {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 1rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    font-style: italic;
  }

  .board-placeholder .soon {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 5px 12px;
    border-radius: 2px;
  }

  /* COMPASS CORE placeholder */
  .compass-placeholder {
    flex: 1;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 40px 20px;
  }

  .compass-placeholder.visible { display: flex; }

  .resources {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 280px;
  }

  .resource-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .resource-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    width: 60px;
    flex-shrink: 0;
  }

  .resource-bar-bg {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .resource-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.5;
  }

  .resource-val {
    font-size: 0.65rem;
    color: var(--muted);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  .compass-soon {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 5px 12px;
    border-radius: 2px;
    margin-top: 8px;
  }

  .compass-title {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">pipelines <span>v0.1</span></div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('inbox')">Inbox</button>
    <button class="tab" onclick="showTab('board')">Board</button>
    <button class="tab" onclick="showTab('compass')">Compass</button>
  </div>
</div>

<!-- INBOX TAB -->
<div id="tab-inbox" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
  <div class="meta-bar">
    <div class="seed-count"><strong id="count">0</strong> seeds in queue</div>
    <button class="clear-all" id="clear-btn" onclick="clearAll()">clear all</button>
  </div>

  <div class="queue" id="queue"></div>

  <div class="input-zone">
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="seed-input" rows="1" placeholder="thought, idea, task, seed..."></textarea>
      </div>
      <button class="submit-btn" onclick="addSeed()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 12L22 2L14 22L11 13L2 12Z"/>
        </svg>
      </button>
    </div>
    <div class="hint">enter to capture · tap seed to delete</div>
  </div>
</div>

<!-- BOARD TAB -->
<div id="tab-board" class="board-placeholder">
  <p>seeds get sorted<br>into their gardens here</p>
  <div class="soon">coming next iteration</div>
</div>

<!-- COMPASS CORE TAB -->
<div id="tab-compass" class="compass-placeholder">
  <div class="compass-title">compass core — resources</div>
  <div class="resources">
    <div class="resource-row">
      <div class="resource-label">time</div>
      <div class="resource-bar-bg"><div class="resource-bar-fill" style="width:60%"></div></div>
      <div class="resource-val">— hrs</div>
    </div>
    <div class="resource-row">
      <div class="resource-label">money</div>
      <div class="resource-bar-bg"><div class="resource-bar-fill" style="width:40%"></div></div>
      <div class="resource-val">— usd</div>
    </div>
    <div class="resource-row">
      <div class="resource-label">energy</div>
      <div class="resource-bar-bg"><div class="resource-bar-fill" style="width:75%"></div></div>
      <div class="resource-val">— sp</div>
    </div>
  </div>
  <div class="compass-soon">coming next iteration</div>
</div>

<script>
  let seeds = JSON.parse(localStorage.getItem('pipelines_seeds') || '[]');

  function save() {
    localStorage.setItem('pipelines_seeds', JSON.stringify(seeds));
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const h = d.getHours().toString().padStart(2,'0');
    const m = d.getMinutes().toString().padStart(2,'0');
    return `${h}:${m}`;
  }

  function render() {
    const queue = document.getElementById('queue');
    queue.innerHTML = '';
    seeds.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'seed';
      el.dataset.index = i;
      el.innerHTML = `
        <div class="seed-dot"></div>
        <div class="seed-text">${escHtml(s.text)}</div>
        <div class="seed-time">${formatTime(s.ts)}</div>
        <button class="seed-delete" onclick="removeSeed(${i})" title="remove">×</button>
      `;
      queue.appendChild(el);
    });
    document.getElementById('count').textContent = seeds.length;
    const clearBtn = document.getElementById('clear-btn');
    if (seeds.length > 0) clearBtn.classList.add('visible');
    else clearBtn.classList.remove('visible');
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addSeed() {
    const inp = document.getElementById('seed-input');
    const text = inp.value.trim();
    if (!text) return;
    seeds.unshift({ text, ts: Date.now() });
    save();
    render();
    inp.value = '';
    inp.style.height = 'auto';
    inp.focus();
    // Scroll queue to top
    document.getElementById('queue').scrollTop = 0;
  }

  function removeSeed(i) {
    const els = document.querySelectorAll('.seed');
    const target = [...els].find(el => parseInt(el.dataset.index) === i);
    if (target) {
      target.classList.add('removing');
      setTimeout(() => {
        seeds.splice(i, 1);
        save();
        render();
      }, 200);
    }
  }

  function clearAll() {
    if (seeds.length === 0) return;
    seeds = [];
    save();
    render();
  }

  // Auto-resize textarea
  const inp = document.getElementById('seed-input');
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = inp.scrollHeight + 'px';
  });

  // Enter to submit (shift+enter for newline)
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addSeed();
    }
  });

  function showTab(name) {
    document.getElementById('tab-inbox').style.display = 'none';
    document.getElementById('tab-board').classList.remove('visible');
    document.getElementById('tab-compass').classList.remove('visible');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    if (name === 'inbox') {
      document.getElementById('tab-inbox').style.display = 'flex';
      document.querySelector('.tab:nth-child(1)').classList.add('active');
    } else if (name === 'board') {
      document.getElementById('tab-board').classList.add('visible');
      document.querySelector('.tab:nth-child(2)').classList.add('active');
    } else if (name === 'compass') {
      document.getElementById('tab-compass').classList.add('visible');
      document.querySelector('.tab:nth-child(3)').classList.add('active');
    }
  }

  render();
  inp.focus();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW registration failed:', err));
  }
</script>
</body>
</html>
