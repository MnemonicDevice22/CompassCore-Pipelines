<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pipelines</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pipelines">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,200&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e0e; --surface: #161616; --surface2: #1a1a1a;
  --border: #242424; --border2: #2e2e2e;
  --text: #e8e4dc; --muted: #5a5a5a; --muted2: #2e2e2e;
  --accent: #c8b98a; --accent-dim: #c8b98a18;
  --task: #8a9e8a; --project: #8a8aaa; --tool: #c8a96a; --log: #9aaa9a;
  --danger: #8a4a4a;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; }
body { display: flex; flex-direction: column; height: 100dvh; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { font-family: 'Fraunces', serif; font-weight: 200; font-size: 1.15rem; color: var(--accent); }
.logo span { color: var(--muted); font-size: 0.6rem; font-family: 'DM Mono', monospace; margin-left: 6px; vertical-align: middle; }

.nav { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.58rem; padding: 9px 14px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; margin-bottom: -1px; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

.meta-bar { padding: 9px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.meta-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.meta-label strong { color: var(--accent); font-weight: 400; }
.meta-action { background: none; border: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: color 0.2s; }
.meta-action:hover { color: var(--danger); }

.scroll-list { flex: 1; overflow-y: auto; padding: 4px 20px 12px; display: flex; flex-direction: column; gap: 6px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.scroll-list:empty::after { content: attr(data-empty); color: var(--muted); font-size: 0.66rem; letter-spacing: 0.08em; text-align: center; margin-top: 48px; display: block; font-style: italic; font-family: 'Fraunces', serif; font-weight: 200; }

.seed { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; animation: seedIn 0.2s cubic-bezier(0.16,1,0.3,1); transition: border-color 0.2s; }
.seed:hover { border-color: var(--border2); }
.seed.removing { animation: seedOut 0.18s ease forwards; overflow: hidden; }
@keyframes seedIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
@keyframes seedOut { to { opacity: 0; transform: translateX(10px); max-height: 0; padding: 0; margin: 0; border-width: 0; } }

.dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--muted2); }
.type-task .dot { background: var(--task); }
.type-project .dot { background: var(--project); }
.type-tool .dot { background: var(--tool); }
.type-log .dot { background: var(--log); }

.seed-body { flex: 1; min-width: 0; }
.seed-text { font-size: 0.78rem; line-height: 1.5; color: var(--text); word-break: break-word; }
.seed-footer { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.seed-time { font-size: 0.56rem; color: var(--muted); }
.badge { font-size: 0.5rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 5px; border-radius: 2px; }
.badge-task { background: #182018; color: var(--task); }
.badge-project { background: #181820; color: var(--project); }
.badge-tool { background: #201c10; color: var(--tool); }
.badge-log { background: #182018; color: var(--log); }

.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; opacity: 0; transition: opacity 0.15s, color 0.15s; padding: 0; flex-shrink: 0; margin-top: 2px; }
.seed:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--danger); }

.input-zone { flex-shrink: 0; border-top: 1px solid var(--border); padding: 12px 20px 20px; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
#seed-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; line-height: 1.5; padding: 9px 13px; resize: none; min-height: 40px; max-height: 100px; outline: none; transition: border-color 0.2s; scrollbar-width: none; }
#seed-input:focus { border-color: var(--accent); }
#seed-input::placeholder { color: var(--muted); font-style: italic; }
.send-btn { background: var(--accent); border: none; border-radius: 4px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
.send-btn:active { transform: scale(0.93); opacity: 0.8; }
.send-btn svg { width: 14px; height: 14px; fill: var(--bg); }
.hint { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.06em; margin-top: 7px; text-align: center; }

/* TYPE POPUP */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; }
.overlay.hidden, .type-popup.hidden { display: none; }
.type-popup { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border2); padding: 16px 20px 28px; z-index: 51; animation: slideUp 0.22s cubic-bezier(0.16,1,0.3,1); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.popup-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 12px 10px; cursor: pointer; text-align: left; transition: border-color 0.15s; }
.type-btn:hover { border-color: var(--border2); }
.type-btn[data-t="task"] { border-left: 2px solid var(--task); }
.type-btn[data-t="project"] { border-left: 2px solid var(--project); }
.type-btn[data-t="tool"] { border-left: 2px solid var(--tool); }
.type-btn[data-t="log"] { border-left: 2px solid var(--log); }
.type-btn-name { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text); display: block; margin-bottom: 3px; letter-spacing: 0.04em; }
.type-btn-desc { font-size: 0.56rem; color: var(--muted); display: block; }

/* PROJECTS */
.board-meta { padding: 9px 20px 6px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.board-hint { font-size: 0.56rem; color: var(--muted); letter-spacing: 0.08em; }
.week-pill { font-size: 0.54rem; color: var(--accent); border: 1px solid var(--accent-dim); padding: 3px 8px; border-radius: 2px; }
.fields-wrap { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; gap: 10px; padding: 8px 20px 16px; align-items: flex-start; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.field-col { min-width: 190px; max-width: 190px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; flex-shrink: 0; overflow: hidden; cursor: grab; }
.field-col.pinned { border-color: #333; }
.field-head { padding: 9px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; user-select: none; }
.field-title { font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
.field-pin-icon { font-size: 0.5rem; color: var(--accent); }
.field-body { padding: 8px; display: flex; flex-direction: column; gap: 5px; min-height: 80px; }
.field-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 7px 9px; font-size: 0.7rem; color: var(--text); line-height: 1.4; display: flex; gap: 6px; align-items: flex-start; }
.field-item-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--project); margin-top: 5px; flex-shrink: 0; }
.field-empty-msg { font-size: 0.6rem; color: var(--muted); font-style: italic; font-family: 'Fraunces', serif; padding: 4px; }
.field-col.drag-over { border-color: var(--accent); }

/* TASKS */
.task-row { background: var(--surface2); border: 1px solid var(--border); border-left: 2px solid var(--task); border-radius: 4px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; animation: seedIn 0.2s cubic-bezier(0.16,1,0.3,1); }
.check { width: 15px; height: 15px; border: 1px solid var(--task); border-radius: 3px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--bg); transition: background 0.15s; }
.check.done { background: var(--task); }
.task-txt { font-size: 0.78rem; color: var(--text); flex: 1; line-height: 1.4; transition: color 0.2s; }
.task-txt.done { text-decoration: line-through; color: var(--muted); }

/* TOOLS */
.tool-row { background: var(--surface2); border: 1px solid var(--border); border-left: 2px solid var(--tool); border-radius: 4px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; animation: seedIn 0.2s cubic-bezier(0.16,1,0.3,1); }
.circle-check { width: 15px; height: 15px; border: 1px solid var(--tool); border-radius: 50%; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.circle-check.done { background: var(--tool); }
.tool-txt { font-size: 0.78rem; color: var(--text); flex: 1; line-height: 1.4; }

/* LOG */
.log-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.log-day-group { margin-bottom: 4px; }
.log-day-header { font-family: 'Fraunces', serif; font-weight: 200; font-style: italic; font-size: 0.72rem; color: var(--accent); padding: 12px 20px 8px; border-bottom: 1px solid var(--border); }
.log-entry { margin: 6px 20px 0; background: var(--surface2); border: 1px solid var(--border); border-left: 2px solid var(--log); border-radius: 4px; padding: 10px 14px; font-size: 0.76rem; line-height: 1.6; color: var(--text); }
.log-entry-time { font-size: 0.54rem; color: var(--muted); margin-top: 5px; }
.log-empty { color: var(--muted); font-size: 0.66rem; text-align: center; padding: 48px 20px; font-style: italic; font-family: 'Fraunces', serif; font-weight: 200; }
.log-input-area { flex-shrink: 0; border-top: 1px solid var(--border); padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 8px; }
#log-input { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; line-height: 1.5; padding: 9px 13px; resize: none; min-height: 60px; outline: none; transition: border-color 0.2s; }
#log-input:focus { border-color: var(--log); }
#log-input::placeholder { color: var(--muted); font-style: italic; }
.log-save-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--log); font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px; cursor: pointer; transition: background 0.15s; }
.log-save-btn:hover { background: #182018; }

/* COMPASS */
.compass-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.c-section { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 14px 16px; }
.c-title { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
.res-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.res-label { font-size: 0.62rem; color: var(--muted); width: 52px; flex-shrink: 0; }
.res-inp { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 5px 8px; outline: none; transition: border-color 0.2s; width: 100%; }
.res-inp:focus { border-color: var(--accent); }
.res-unit { font-size: 0.56rem; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
.bar-bg { width: 100%; height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 12px; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 1px; opacity: 0.45; transition: width 0.35s ease; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
.stat-l { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
.stat-v { font-family: 'Fraunces', serif; font-weight: 200; font-size: 1.1rem; color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">pipelines <span>v0.2</span></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="show('inbox')">Inbox</button>
  <button class="nav-btn" onclick="show('projects')">Projects</button>
  <button class="nav-btn" onclick="show('tasks')">Tasks</button>
  <button class="nav-btn" onclick="show('tools')">Tools</button>
  <button class="nav-btn" onclick="show('log')">Log</button>
  <button class="nav-btn" onclick="show('compass')">Compass</button>
</nav>

<!-- INBOX -->
<div class="view active" id="view-inbox">
  <div class="meta-bar">
    <div class="meta-label"><strong id="inbox-count">0</strong> seeds in queue</div>
    <button class="meta-action" onclick="clearInbox()">clear all</button>
  </div>
  <div class="scroll-list" id="inbox-list" data-empty="thoughts flow through here"></div>
  <div class="input-zone">
    <div class="input-row">
      <textarea id="seed-input" rows="1" placeholder="thought, idea, task, seed..."></textarea>
      <button class="send-btn" onclick="addSeed()">
        <svg viewBox="0 0 24 24"><path d="M2 12L22 2L14 22L11 13L2 12Z"/></svg>
      </button>
    </div>
    <div class="hint">enter to capture · classify after</div>
  </div>
</div>

<!-- PROJECTS -->
<div class="view" id="view-projects">
  <div class="board-meta">
    <div class="board-hint">drag fields to reorder · top 3 are active</div>
    <div class="week-pill" id="week-pill">—</div>
  </div>
  <div class="fields-wrap" id="fields-wrap"></div>
</div>

<!-- TASKS -->
<div class="view" id="view-tasks">
  <div class="meta-bar">
    <div class="meta-label"><strong id="task-count">0</strong> open</div>
    <button class="meta-action" onclick="clearDone()">clear done</button>
  </div>
  <div class="scroll-list" id="tasks-list" data-empty="no tasks yet"></div>
</div>

<!-- TOOLS -->
<div class="view" id="view-tools">
  <div class="meta-bar">
    <div class="meta-label"><strong id="tool-count">0</strong> tools</div>
  </div>
  <div class="scroll-list" id="tools-list" data-empty="no tools yet"></div>
</div>

<!-- LOG -->
<div class="view" id="view-log">
  <div class="log-scroll" id="log-scroll"><div id="log-entries"></div></div>
  <div class="log-input-area">
    <textarea id="log-input" placeholder="record an insight, a moment, a feeling..."></textarea>
    <button class="log-save-btn" onclick="saveLog()">record entry ↵</button>
  </div>
</div>

<!-- COMPASS -->
<div class="view" id="view-compass">
  <div class="compass-scroll">
    <div class="c-section">
      <div class="c-title">weekly resources</div>
      <div class="res-row">
        <div class="res-label">time</div>
        <input class="res-inp" type="number" id="r-time" placeholder="hrs available" oninput="saveRes()">
        <div class="res-unit">hrs</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="b-time" style="width:0"></div></div>
      <div class="res-row">
        <div class="res-label">money</div>
        <input class="res-inp" type="number" id="r-money" placeholder="weekly budget" oninput="saveRes()">
        <div class="res-unit">usd</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="b-money" style="width:0"></div></div>
      <div class="res-row">
        <div class="res-label">energy</div>
        <input class="res-inp" type="number" id="r-energy" placeholder="0–15" max="15" oninput="saveRes()">
        <div class="res-unit">/ 15</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="b-energy" style="width:0"></div></div>
    </div>
    <div class="c-section">
      <div class="c-title">seed inventory</div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-l">tasks</div><div class="stat-v" id="s-tasks">0</div></div>
        <div class="stat"><div class="stat-l">projects</div><div class="stat-v" id="s-projects">0</div></div>
        <div class="stat"><div class="stat-l">tools</div><div class="stat-v" id="s-tools">0</div></div>
        <div class="stat"><div class="stat-l">log entries</div><div class="stat-v" id="s-log">0</div></div>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY + POPUP -->
<div class="overlay hidden" id="overlay" onclick="closePopup()"></div>
<div class="type-popup hidden" id="type-popup">
  <div class="popup-label">what kind of seed is this?</div>
  <div class="type-grid">
    <button class="type-btn" data-t="task" onclick="classify('task')">
      <span class="type-btn-name">Task</span>
      <span class="type-btn-desc">to do · has consequences</span>
    </button>
    <button class="type-btn" data-t="project" onclick="classify('project')">
      <span class="type-btn-name">Project</span>
      <span class="type-btn-desc">to develop · consumes time</span>
    </button>
    <button class="type-btn" data-t="tool" onclick="classify('tool')">
      <span class="type-btn-name">Tool</span>
      <span class="type-btn-desc">to procure · costs money</span>
    </button>
    <button class="type-btn" data-t="log" onclick="classify('log')">
      <span class="type-btn-name">Log</span>
      <span class="type-btn-desc">to remember · just record</span>
    </button>
  </div>
</div>

<script>
const FIELD_DEFAULTS = ['Career','Social','Coding','Writing','Music','Fitness','Cooking','Introspection','Agriculture','House Repairs','Clothes Design'];

let S = {
  seeds: [], logs: [],
  fieldOrder: [...FIELD_DEFAULTS],
  fieldSeeds: {},
  res: { time:'', money:'', energy:'' }
};

function load() {
  try { const d = localStorage.getItem('pip_v2'); if(d) S = {...S, ...JSON.parse(d)}; } catch(e){}
}
function save() { localStorage.setItem('pip_v2', JSON.stringify(S)); }
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hhmm(ts) { const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

// NAV
function show(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`.nav-btn[onclick="show('${v}')"]`).classList.add('active');
  if(v==='projects') renderBoard();
  if(v==='tasks') renderTasks();
  if(v==='tools') renderTools();
  if(v==='log') renderLog();
  if(v==='compass') renderCompass();
}

// INBOX
let pendingId = null;

function addSeed() {
  const el = document.getElementById('seed-input');
  const txt = el.value.trim();
  if(!txt) return;
  const s = {id: Date.now(), text: txt, type: null, ts: Date.now()};
  S.seeds.unshift(s);
  save();
  renderInbox();
  el.value=''; el.style.height='auto'; el.focus();
  pendingId = s.id;
  document.getElementById('type-popup').classList.remove('hidden');
  document.getElementById('overlay').classList.remove('hidden');
}

function classify(type) {
  const s = S.seeds.find(x=>x.id===pendingId);
  if(s) {
    s.type = type;
    if(type==='log') {
      S.logs.unshift({id: Date.now(), text: s.text, ts: Date.now()});
      S.seeds = S.seeds.filter(x=>x.id!==s.id);
    }
    save(); renderInbox(); updateStats();
  }
  closePopup();
}

function closePopup() {
  document.getElementById('type-popup').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
  pendingId = null;
}

function removeSeed(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if(el) { el.classList.add('removing'); setTimeout(()=>{ S.seeds=S.seeds.filter(x=>x.id!==id); save(); renderInbox(); updateStats(); },180); }
}

function clearInbox() { S.seeds=[]; save(); renderInbox(); updateStats(); }

function renderInbox() {
  const list = document.getElementById('inbox-list');
  list.innerHTML='';
  S.seeds.forEach(s=>{
    const el=document.createElement('div');
    el.className=`seed type-${s.type||'none'}`;
    el.dataset.id=s.id;
    el.innerHTML=`<div class="dot"></div>
    <div class="seed-body">
      <div class="seed-text">${esc(s.text)}</div>
      <div class="seed-footer">
        <div class="seed-time">${hhmm(s.ts)}</div>
        ${s.type?`<div class="badge badge-${s.type}">${s.type}</div>`:''}
      </div>
    </div>
    <button class="del-btn" onclick="removeSeed(${s.id})">×</button>`;
    list.appendChild(el);
  });
  document.getElementById('inbox-count').textContent = S.seeds.length;
}

// PROJECTS BOARD
let dragField = null;

function renderBoard() {
  const wrap = document.getElementById('fields-wrap');
  wrap.innerHTML='';
  S.fieldOrder.forEach((f,i)=>{
    const col=document.createElement('div');
    col.className='field-col'+(i<3?' pinned':'');
    col.dataset.field=f;
    col.draggable=true;
    const items=(S.fieldSeeds[f]||[]);
    col.innerHTML=`
      <div class="field-head">
        <div class="field-title">${f}</div>
        ${i<3?'<div class="field-pin-icon">★</div>':''}
      </div>
      <div class="field-body">
        ${items.length ? items.map(t=>`<div class="field-item"><div class="field-item-dot"></div>${esc(t)}</div>`).join('') : '<div class="field-empty-msg">empty garden</div>'}
      </div>`;
    col.addEventListener('dragstart',()=>{ dragField=f; });
    col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{ e.preventDefault(); col.classList.remove('drag-over');
      if(dragField&&dragField!==f){
        const fi=S.fieldOrder.indexOf(dragField), ti=S.fieldOrder.indexOf(f);
        S.fieldOrder.splice(fi,1); S.fieldOrder.splice(ti,0,dragField);
        save(); renderBoard();
      }
    });
    wrap.appendChild(col);
  });
  // week badge
  const d=new Date(), day=d.getDay();
  document.getElementById('week-pill').textContent = day===0 ? 'reorder today' : `unlocks sunday`;
}

// TASKS
function renderTasks() {
  const list=document.getElementById('tasks-list');
  list.innerHTML='';
  const tasks=S.seeds.filter(s=>s.type==='task');
  tasks.forEach(s=>{
    const el=document.createElement('div');
    el.className='task-row';
    el.innerHTML=`<div class="check${s.done?' done':''}" onclick="toggleTask(${s.id})">${s.done?'✓':''}</div>
    <div class="task-txt${s.done?' done':''}">${esc(s.text)}</div>
    <button class="del-btn" style="opacity:0.4" onclick="removeSeed(${s.id})">×</button>`;
    el.querySelector('.del-btn').style.opacity='0.4';
    list.appendChild(el);
  });
  document.getElementById('task-count').textContent=tasks.filter(t=>!t.done).length;
}

function toggleTask(id) { const s=S.seeds.find(x=>x.id===id); if(s){s.done=!s.done; save(); renderTasks();} }
function clearDone() { S.seeds=S.seeds.filter(s=>!(s.type==='task'&&s.done)); save(); renderTasks(); renderInbox(); updateStats(); }

// TOOLS
function renderTools() {
  const list=document.getElementById('tools-list');
  list.innerHTML='';
  const tools=S.seeds.filter(s=>s.type==='tool');
  tools.forEach(s=>{
    const el=document.createElement('div');
    el.className='tool-row';
    el.innerHTML=`<div class="circle-check${s.acquired?' done':''}" onclick="toggleTool(${s.id})"></div>
    <div class="tool-txt">${esc(s.text)}</div>
    <button class="del-btn" style="opacity:0.4" onclick="removeSeed(${s.id})">×</button>`;
    list.appendChild(el);
  });
  document.getElementById('tool-count').textContent=tools.length;
}

function toggleTool(id) { const s=S.seeds.find(x=>x.id===id); if(s){s.acquired=!s.acquired; save(); renderTools();} }

// LOG
function saveLog() {
  const el=document.getElementById('log-input');
  const txt=el.value.trim();
  if(!txt) return;
  S.logs.unshift({id:Date.now(), text:txt, ts:Date.now()});
  save(); el.value=''; renderLog(); updateStats();
}

function renderLog() {
  const container=document.getElementById('log-entries');
  container.innerHTML='';
  if(!S.logs.length){ container.innerHTML='<div class="log-empty">the record begins here</div>'; return; }
  const groups={};
  S.logs.forEach(e=>{
    const d=new Date(e.ts);
    const k=d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    if(!groups[k]) groups[k]=[];
    groups[k].push(e);
  });
  Object.entries(groups).forEach(([date,entries])=>{
    const g=document.createElement('div');
    g.className='log-day-group';
    g.innerHTML=`<div class="log-day-header">${date}</div>`;
    entries.forEach(e=>{
      const el=document.createElement('div');
      el.className='log-entry';
      el.innerHTML=`${esc(e.text)}<div class="log-entry-time">${hhmm(e.ts)}</div>`;
      g.appendChild(el);
    });
    container.appendChild(g);
  });
}

// COMPASS
function saveRes() {
  S.res.time=document.getElementById('r-time').value;
  S.res.money=document.getElementById('r-money').value;
  S.res.energy=document.getElementById('r-energy').value;
  save(); updateBars();
}

function updateBars() {
  document.getElementById('b-time').style.width=Math.min(100,(parseFloat(S.res.time)||0)/40*100)+'%';
  document.getElementById('b-money').style.width=Math.min(100,(parseFloat(S.res.money)||0)/500*100)+'%';
  document.getElementById('b-energy').style.width=Math.min(100,(parseFloat(S.res.energy)||0)/15*100)+'%';
}

function renderCompass() {
  document.getElementById('r-time').value=S.res.time||'';
  document.getElementById('r-money').value=S.res.money||'';
  document.getElementById('r-energy').value=S.res.energy||'';
  updateBars(); updateStats();
}

function updateStats() {
  document.getElementById('s-tasks').textContent=S.seeds.filter(s=>s.type==='task').length;
  document.getElementById('s-projects').textContent=S.seeds.filter(s=>s.type==='project').length;
  document.getElementById('s-tools').textContent=S.seeds.filter(s=>s.type==='tool').length;
  document.getElementById('s-log').textContent=S.logs.length;
}

// INPUT HANDLERS
const si=document.getElementById('seed-input');
si.addEventListener('input',()=>{ si.style.height='auto'; si.style.height=si.scrollHeight+'px'; });
si.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addSeed();} });
document.getElementById('log-input').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveLog();} });

// INIT
load(); renderInbox(); updateStats(); si.focus();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
